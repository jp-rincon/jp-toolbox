version: '3.8'

services:
  db:
    image: teikadev/postgres13-partman
    container_name: Tobo3Postgres
    ports:
      - "${DB_PORT:-5434}:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - Tobo3PostgresData:/var/lib/postgresql/data

  app:
    image: domingosjunior87/php5.3-pgsql
    container_name: tobo3_php_apache
    hostname: tobo3_php_apache
    ports:
      - "${APP_PORT:-8082}:80"
    volumes:
      # Proyecto principal
      - ${PROJECT_ROOT:-C:/Users/rinco/tobo3_g}:/var/www/html/tobo3_g
      # Librerías compartidas
      - C:/Users/rinco/basura:/var/www/html/basura
      - C:/Users/rinco/jQuery:/var/www/html/jQuery
      - C:/Users/rinco/tcpdf:/var/www/html/tcpdf
      - C:/Users/rinco/bootstrap:/var/www/html/bootstrap
      - C:/Users/rinco/Classes:/var/www/html/Classes
      - C:/Users/rinco/OpenLayers:/var/www/html/OpenLayers
      - C:/Users/rinco/zpcal:/var/www/html/zpcal
      - C:/Users/rinco/Highcharts:/var/www/html/Highcharts

volumes:
  Tobo3PostgresData:
    driver: local